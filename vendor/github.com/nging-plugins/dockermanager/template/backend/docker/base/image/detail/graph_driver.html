{{$v := $.Data}}
{{$data := $v.Data}}
<tr>
    <th class="text-right"><strong>{{$v.Name}}</strong></th>
    <td colspan="3">
        <table class="table table-bordered no-margin-y">
            <tbody>
                <tr>
                    <th class="text-right"><strong>LowerDir</strong></th>
                    <td>{{$data.LowerDir}}</td>
                </tr>
                <tr>
                    <th class="text-right"><strong>MergedDir</strong></th>
                    <td>{{$data.MergedDir}}</td>
                </tr>
                <tr>
                    <th class="text-right"><strong>UpperDir</strong></th>
                    <td>{{$data.UpperDir}}</td>
                </tr>
                <tr>
                    <th class="text-right"><strong>WorkDir</strong></th>
                    <td>{{$data.WorkDir}}</td>
                </tr>
            </tbody>
        </table>
    </td>
</tr>
