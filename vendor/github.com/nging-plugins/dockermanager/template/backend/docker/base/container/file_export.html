{{Extend "layout"}}
{{Block "title"}}{{$.Stored.title}} - {{"镜像管理"|$.T}}{{/Block}}
{{Block "breadcrumb"}}
{{Super}}
<li><a href="{{BackendURL}}/docker/base/image/index">{{"镜像管理"|$.T}}</a></li>
<li class="active">{{$.Stored.title}}</li>
{{/Block}}

{{Block "main"}}
<div class="row">
    <div class="col-md-12">
        <div class="block-flat">
            <div class="header">
                <h3>{{$.Stored.title}}</h3>
            </div>
            <div class="content">
                <form class="form-horizontal group-border-dashed" id="formContainerFileExport" method="POST" action="{{$.URI}}">
                    <div class="form-group">
                        <label class="col-sm-2 control-label">{{"容器文件"|$.T}}</label>
                        <div class="col-sm-8">
                            <input type="text" class="form-control" name="srcPath" value="{{$.Form `srcPath`}}" required>
                            <div class="help-block">{{`容器内的路径`|$.T}}</div>
                        </div>
                    </div>
                    <div class="form-group">
                      <label class="col-sm-2 control-label">{{"宿主机路径"|$.T}}</label>
                      <div class="col-sm-8">
                        <input type="text" class="form-control" name="dstPath" value="{{$.Form `dstPath`}}">
                        <div class="help-block">{{`如果不填则表示直接下载`|$.T}}</div>
                      </div>
                    </div>
                    <div class="form-group form-submit-group">
                      <div class="col-sm-9 col-sm-offset-2">
                          <button type="submit" class="btn btn-primary btn-lg"><i class="fa fa-cloud-download"></i> {{"确定"|$.T}}</button>
                          <button type="reset" class="btn btn-default btn-lg"><i class="fa fa-refresh"></i> {{"重置"|$.T}}</button>
                      </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

{{/Block}}
