{{$vv := $.Data}}
{{if $vv.Name}}
<tr>
	<td class="text-right">
		<strong>Name</strong>:
	</td>
	<td colspan="3">{{$vv.Name}}</td>
</tr>
{{end}}
<tr>
	<td class="text-right">
		<strong>Type</strong>:
	</td>
	<td>{{$vv.Type}}</td>
	<td class="text-right">
		<strong>Driver</strong>:
	</td>
	<td>{{$vv.Driver}}</td>
</tr>
<tr>
	<td class="text-right">
		<strong>Source</strong>:
	</td>
	<td colspan="3">
		{{$vv.Source}}
	</td>
</tr>
<tr>
	<td class="text-right">
		<strong>Destination</strong>:
	</td>
	<td colspan="3">
		{{$vv.Destination}}
	</td>
</tr>
<tr>
	<td class="text-right">
		<strong>Mode</strong>:
	</td>
	<td>
		{{$vv.Mode}} 
		{{if $vv.RW}}(RW){{end}}
	</td>
	<td class="text-right">
		<strong>Propagation</strong>:
	</td>
	<td>
		{{$vv.Propagation}}
	</td>
</tr>
