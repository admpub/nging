<script>
$(function(){
  App.editor.inputmask("input[inputmask-filesize]",{regex:"^\\d+(B|K|M|G)$"});
  App.editor.inputmask("input[inputmask-duration]",{regex:"^(\\d+h)?(\\d+m)?(\\d+s)?(\\d+ms)?(\\d+(us|µs))?(\\d+ns)?$"});
  App.editor.inputmask("input[data-inputmask],input[inputmask]");
});
</script>
